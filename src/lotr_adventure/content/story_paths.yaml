story_paths:
  - id: bilbo_there_and_back
    label: "Bilbo: There and Back Again"
    character_id: bilbo
    summary: From hearth and reluctance into dark trial and hard-earned cunning.
    steps:
      - anchor_id: unexpected_party
        title: A Burden Leaves Home
        objective: Listen, question, and weigh whether to take the East Road from comfort into adventure.
        guidance: Bilbo should feel the pull between hearth-comfort and Tookish restlessness.
        suggested_actions:
          - talk Gandalf
          - talk Thorin
          - go East Road
        required_npcs:
          - Gandalf
          - Thorin Oakenshield
      - anchor_id: bilbo_with_trolls
        title: Firelight in the Trollshaws
        objective: Endure the fear of the trolls' camp, listen sharply for Gandalf's unseen help, and learn how easily a small burglar's wits may be swallowed by a larger world's brutality.
        guidance: Bilbo should feel frightened, embarrassed, and suddenly aware that adventure is not only songs and roads.
        suggested_actions:
          - talk Gandalf
          - inspect campfire
          - go The Trolls' Clearing
        required_npcs:
          - Gandalf
          - William Huggins
        required_locations:
          - The Trolls' Clearing
        required_fact_keywords:
          - troll
      - anchor_id: bilbo_in_rivendell
        title: Rest Under Elven Roofs
        objective: Receive Rivendell's welcome, listen to Elrond's lore, and feel how comfort and old wisdom can strengthen a road already turning dangerous.
        guidance: Bilbo should feel relieved, curious, and a little ashamed of how quickly he can forget danger in beautiful safety.
        suggested_actions:
          - talk Elrond
          - talk Gandalf
          - go Elrond's House
        required_npcs:
          - Elrond
          - Gandalf
        required_locations:
          - Elrond's House
        required_fact_keywords:
          - rivendell
      - anchor_id: bilbo_in_goblin_town
        title: Fire and Flight Under the Mountain
        objective: Survive Goblin-town's uproar, hold close to Gandalf's leadership when all order breaks, and discover how swiftly peril can turn to separation.
        guidance: Bilbo should feel overwhelmed, breathless, and dependent on others right up to the moment he is forced into solitude.
        suggested_actions:
          - talk Gandalf
          - inspect goblin hall
          - go The Great Goblin's Hall
        required_npcs:
          - Gandalf
          - The Great Goblin
        required_locations:
          - The Great Goblin's Hall
        required_fact_keywords:
          - goblin
      - anchor_id: riddles_in_the_dark
        title: Alone Beneath the Mountain
        objective: Endure the dark, study Gollum, and seek the way out without forgetting fear.
        guidance: Bilbo is frightened but beginning to discover resourcefulness and pity.
        suggested_actions:
          - talk Gollum
          - inspect black water
          - go Black Tunnel
        required_npcs:
          - Gollum
        required_inspections:
          - black water
        required_fact_keywords:
          - dark
      - anchor_id: bilbo_with_eagles
        title: Rescue Above the Pines
        objective: Recover from terror under the mountains, receive the eagles' stern mercy, and feel how suddenly death may turn into wind and open sky.
        guidance: Bilbo should feel stunned, grateful, and still half in dread, with rescue seeming real but not yet restful.
        suggested_actions:
          - talk Great Eagle
          - talk Gandalf
          - go The Eagle Ledge
        required_npcs:
          - Great Eagle
          - Gandalf
        required_locations:
          - The Eagle Ledge
        required_fact_keywords:
          - eagle
      - anchor_id: bilbo_at_beorns_house
        title: Rest Under Grim Protection
        objective: Receive Beorn's testing hospitality, listen carefully to Gandalf's tact, and learn that safety in the wild can still be stern and conditional.
        guidance: Bilbo should feel grateful, watchful, and still slightly overwhelmed by the scale of the world beyond hobbit custom.
        suggested_actions:
          - talk Beorn
          - talk Gandalf
          - go The Bee Pastures
        required_npcs:
          - Beorn
          - Gandalf
        required_locations:
          - The Bee Pastures
        required_fact_keywords:
          - beorn
      - anchor_id: bilbo_in_mirkwood
        title: The Burglar Stands Forward
        objective: Endure Mirkwood's oppression, protect the dwarves where you can, and discover that fear does not forbid courage.
        guidance: Bilbo should feel tired, hungry, and pressed upon by the forest, yet more capable than before.
        suggested_actions:
          - talk Balin
          - inspect spider glade
          - go The Dark Track
        required_npcs:
          - Balin
        required_inspections:
          - spider glade
        required_fact_keywords:
          - mirkwood
      - anchor_id: bilbo_in_woodland_realm
        title: Beneath the Elvenking's Halls
        objective: Keep your freedom hidden, study the underground halls, and begin shaping escape through patience rather than force.
        guidance: Bilbo should feel solitary, clever, and increasingly responsible for the dwarves' fate.
        suggested_actions:
          - inspect elven gate
          - talk Thranduil
          - go The Wine Cellars
        required_npcs:
          - Thranduil
        required_locations:
          - The Wine Cellars
        required_fact_keywords:
          - elves
      - anchor_id: bilbo_in_lake_town
        title: Songs by the Water
        objective: Receive the welcome of Lake-town, listen to the old songs now laid upon Thorin's errand, and feel how expectation can become its own burden.
        guidance: Bilbo should enjoy the comfort yet feel uneasy at being drawn into a larger public tale.
        suggested_actions:
          - talk Bard
          - talk Thorin
          - go The Quays
        required_npcs:
          - Bard
          - Thorin Oakenshield
        required_locations:
          - The Quays
        required_fact_keywords:
          - lake-town
      - anchor_id: bilbo_at_hidden_door
        title: Waiting on the Doorstep
        objective: Read the mountain's signs, speak with Balin, and search patiently for the secret way into Erebor.
        guidance: Bilbo should feel the burden of others' hopes and the loneliness of dragon-shadow.
        suggested_actions:
          - talk Balin
          - inspect hidden door
          - go Ravenhill Path
        required_npcs:
          - Balin
        required_inspections:
          - hidden door
        required_fact_keywords:
          - lonely mountain
      - anchor_id: bilbo_in_smaugs_lair
        title: Words Beneath the Mountain
        objective: Face the dragon with wit rather than strength, read his pride, and survive the encounter with your courage still hidden.
        guidance: Bilbo is very small here, but not helpless; fear and cleverness should sharpen each other.
        suggested_actions:
          - talk Smaug
          - inspect treasure hall
          - go The Secret Way
        required_npcs:
          - Smaug
        required_inspections:
          - treasure hall
        required_fact_keywords:
          - dragon
      - anchor_id: bilbo_at_front_gate
        title: The Mountain Closed Behind
        objective: Read the Mountain's changed silence after Smaug's going, watch Thorin harden against counsel, and understand how treasure can become a siege before any battle is fought.
        guidance: Bilbo should feel relief, foreboding, and moral unease as dragon-fear gives way to dwarf-pride and gathering claims below.
        suggested_actions:
          - talk Thorin
          - talk Balin
          - go The Front Gate
        required_npcs:
          - Thorin Oakenshield
          - Balin
        required_locations:
          - The Front Gate
        required_fact_keywords:
          - smaug
      - anchor_id: bilbo_in_besiegers_camp
        title: A Thief in the Night
        objective: Carry the Arkenstone into the besiegers' camp, measure Bard and Gandalf rightly, and choose peace over mere loyalty to pride.
        guidance: Bilbo should feel torn, ashamed, resolute, and more morally awake than at the road's beginning.
        suggested_actions:
          - talk Bard
          - talk Gandalf
          - go The Command Tent
        required_npcs:
          - Bard
          - Gandalf
        required_locations:
          - The Command Tent
        required_fact_keywords:
          - arkenstone
      - anchor_id: bilbo_after_battle
        title: Mourning on Ravenhill
        objective: Walk among the cost of victory, receive Gandalf's comfort, and understand how the journey has altered treasure, friendship, and your own heart.
        guidance: Bilbo should feel grief, relief, and a hobbit's homesick wisdom rather than triumph.
        suggested_actions:
          - talk Balin
          - talk Gandalf
          - inspect ravenhill
        required_npcs:
          - Balin
          - Gandalf
        required_inspections:
          - ravenhill
        required_fact_keywords:
          - battle
      - anchor_id: bilbo_back_at_bag_end
        title: Home and Changed
        objective: Return to Bag End, reckon the cost of adventure against the comfort of home, and discover that the old life cannot be resumed unchanged.
        guidance: Bilbo should feel amused, wistful, and wiser, with comfort restored but innocence altered.
        suggested_actions:
          - talk Gandalf
          - talk Balin
          - inspect round door
        required_npcs:
          - Gandalf
          - Balin
        required_inspections:
          - round door
        required_fact_keywords:
          - home
  - id: frodo_ring_bearer
    label: "Frodo: The Burden of the Road"
    character_id: frodo
    summary: From the Shire's green ease into hidden danger, refuge, and grave counsel.
    steps:
      - anchor_id: frodo_departs_shire
        title: The Last Ease of Home
        objective: Set out from the Shire, speak with your companions, and feel how ordinary roads begin to darken.
        guidance: Keep the Shire vivid enough that its loss matters.
        suggested_actions:
          - talk Sam
          - talk Pippin
          - go Woody End
        required_npcs:
          - Samwise Gamgee
          - Pippin Took
        required_locations:
          - Woody End
        required_fact_keywords:
          - shire
      - anchor_id: frodo_in_old_forest
        title: Under the Old Forest's Will
        objective: Endure the Forest's strange hostility, attend to your companions, and learn how small ordinary courage can feel under older powers.
        guidance: Frodo should feel disoriented, wary, and conscious that the world has become stranger than mere pursuit on roads.
        suggested_actions:
          - talk Merry
          - inspect old willow
          - go The Withywindle Bank
        required_npcs:
          - Merry Brandybuck
        required_locations:
          - The Withywindle Bank
        required_fact_keywords:
          - forest
      - anchor_id: frodo_at_bombadils_house
        title: Rest in a Stranger Peace
        objective: Receive Bombadil's hospitality, question what sort of safety this is, and let wonder interrupt fear without canceling it.
        guidance: Frodo should feel relieved, puzzled, and gently unsettled by a peace unlike any he understands.
        suggested_actions:
          - talk Tom
          - talk Goldberry
          - go The Rain-washed Room
        required_npcs:
          - Tom Bombadil
          - Goldberry
        required_locations:
          - The Rain-washed Room
        required_fact_keywords:
          - house
      - anchor_id: frodo_on_barrow_downs
        title: Cold Hill and Ancient Fear
        objective: Face the dread of the Barrow-downs, hold to memory and friendship, and learn how near old death still lies to the Shire.
        guidance: Frodo should feel fear, chill, and a deepening seriousness about the ancient world pressing close.
        suggested_actions:
          - talk Tom
          - inspect standing stone
          - go The Barrow Chamber
        required_npcs:
          - Tom Bombadil
        required_locations:
          - The Barrow Chamber
        required_fact_keywords:
          - barrow
      - anchor_id: frodo_at_bree
        title: Strangers in the Inn
        objective: Judge whom to trust in Bree and whether the Ranger's counsel should be heeded.
        guidance: Fear and uncertainty should press close, but hope should not vanish.
        suggested_actions:
          - talk Aragorn
          - talk Barliman Butterbur
          - inspect common room
        required_npcs:
          - Aragorn
        required_inspections:
          - common room
        required_fact_keywords:
          - bree
      - anchor_id: frodo_at_weathertop
        title: The Hill of Watchers
        objective: Endure the exposed height, trust Aragorn's watchfulness, and survive the growing sense of pursuit.
        guidance: Frodo should feel hunted, cold, and inwardly strained.
        suggested_actions:
          - talk Aragorn
          - inspect ruined ring
          - go The Eastward Path
        required_npcs:
          - Aragorn
        required_inspections:
          - ruined ring
      - anchor_id: frodo_ford_bruinen
        title: Flight to the Ford
        objective: Hold to the road, heed your protectors, and press on until refuge is within reach.
        guidance: Weariness and fear should dominate, but the nearness of safety should be palpable.
        suggested_actions:
          - talk Glorfindel
          - inspect ford bank
          - go The Rivendell Road
        required_npcs:
          - Glorfindel
        required_inspections:
          - ford bank
      - anchor_id: frodo_in_rivendell
        title: Healing in the Valley
        objective: Speak with the wise in Rivendell and understand the burden now laid plainly before you.
        guidance: Rivendell should feel like healing touched by sorrow and long memory.
        suggested_actions:
          - talk Gandalf
          - talk Elrond
          - go The Council Porch
        required_npcs:
          - Gandalf
          - Elrond
        required_locations:
          - The Council Porch
        required_fact_keywords:
          - rivendell
      - anchor_id: frodo_at_west_gate
        title: The Choice of the Dark Door
        objective: Weigh the dread before Moria, attend to Gandalf's counsel, and accept the road necessity leaves.
        guidance: Frodo should feel the Fellowship's weariness and his own foreboding, while still trusting those wiser than he.
        suggested_actions:
          - talk Gandalf
          - talk Boromir
          - inspect west-gate
        required_npcs:
          - Gandalf
          - Boromir
        required_inspections:
          - west-gate
        required_fact_keywords:
          - moria
      - anchor_id: frodo_in_lorien
        title: Beauty After Darkness
        objective: Grieve, rest, and receive the strange healing of Lórien without forgetting the burden you still bear.
        guidance: Frodo should feel consoled but never released from responsibility.
        suggested_actions:
          - talk Galadriel
          - talk Haldir
          - go Caras Galadhon
        required_npcs:
          - Galadriel
        required_locations:
          - Caras Galadhon
        required_fact_keywords:
          - lórien
      - anchor_id: frodo_at_amon_hen
        title: The Sundering Choice
        objective: Face the strain within the Company, resist the pressure around the Ring, and choose the road you must take.
        guidance: Frodo should feel both love for his companions and the terrible loneliness of his burden.
        suggested_actions:
          - talk Boromir
          - talk Sam
          - inspect seat of seeing
        required_npcs:
          - Boromir
          - Samwise Gamgee
        required_inspections:
          - seat of seeing
        required_fact_keywords:
          - fellowship
      - anchor_id: frodo_in_emyn_muil
        title: Stones, Weariness, and a Tamed Guide
        objective: Endure the bitter stony maze, judge whether Gollum can be bound by pity, and keep Sam's loyalty from hardening into cruelty.
        guidance: Frodo should feel exhausted, wary, and morally intent, with pity becoming an active burden rather than a sentiment.
        suggested_actions:
          - talk Gollum
          - talk Sam
          - go The Slinker Stair
        required_npcs:
          - Gollum
          - Samwise Gamgee
        required_locations:
          - The Slinker Stair
        required_fact_keywords:
          - smeagol
      - anchor_id: frodo_in_dead_marshes
        title: Lights Under the Water
        objective: Endure the marshes, attend to Gollum's warnings, and learn what sort of pity can survive in a wasted land.
        guidance: Frodo should feel physically drained but spiritually alert to suffering, even in horror.
        suggested_actions:
          - talk Gollum
          - inspect dead faces
          - go The Marsh Path
        required_npcs:
          - Gollum
        required_inspections:
          - dead faces
        required_fact_keywords:
          - marsh
      - anchor_id: frodo_at_henneth_annun
        title: The Window Behind the Waterfall
        objective: Meet Faramir without surrendering either truth or the burden's secrecy, and measure how pity, discernment, and mistrust contend in fair Ithilien.
        guidance: Frodo should feel strained yet relieved by temporary shelter, keenly aware that mercy and danger are now mixed together in men as well as in Gollum.
        suggested_actions:
          - talk Faramir
          - talk Sam
          - go The Forbidden Pool
        required_npcs:
          - Faramir
          - Samwise Gamgee
        required_locations:
          - The Forbidden Pool
        required_fact_keywords:
          - ithilien
      - anchor_id: frodo_on_morgul_stairs
        title: The Bitter Stair
        objective: Climb the Morgul stairs, endure the thinning of body and hope, and keep faith with Sam while Gollum's malice grows more wounded and secret.
        guidance: Frodo should feel spiritually and physically worn, but not yet stripped of pity.
        suggested_actions:
          - talk Gollum
          - talk Sam
          - go The High Stair
        required_npcs:
          - Gollum
          - Samwise Gamgee
        required_locations:
          - The High Stair
        required_fact_keywords:
          - morgul
      - anchor_id: frodo_in_shelobs_lair
        title: Darkness Unguessed
        objective: Pass into the tunnel's living night, trust Sam's nearness when sight and strength fail, and endure terror without surrendering wholly to it.
        guidance: Frodo should feel faint, spiritually strained, and almost dreamlike under the weight of darkness and the Ring.
        suggested_actions:
          - talk Sam
          - inspect reeking passage
          - go The Great Cleft
        required_npcs:
          - Samwise Gamgee
          - Shelob
        required_locations:
          - The Great Cleft
        required_fact_keywords:
          - darkness
      - anchor_id: frodo_at_sammath_naur
        title: The Fire at the End
        objective: Make the final ascent with Sam, face the inward and outward end of the quest, and bring the burden to the Crack of Doom.
        guidance: Frodo should feel utterly spent, inwardly naked before the Ring, and sustained only by the last remnants of will and love.
        suggested_actions:
          - talk Sam
          - inspect fire-chamber
          - go The Slopes of Orodruin
        required_npcs:
          - Samwise Gamgee
        required_locations:
          - The Slopes of Orodruin
          - Sammath Naur
        required_fact_keywords:
          - fire
      - anchor_id: frodo_at_cormallen
        title: Waking to Honor
        objective: Wake amid healing, friendship, and public joy, and try to understand victory when it has cost so much inwardly.
        guidance: Frodo should feel gentle amazement, frailty, and gratitude rather than triumphal ease.
        suggested_actions:
          - talk Gandalf
          - talk Sam
          - go The King's Pavilion
        required_npcs:
          - Gandalf
          - Samwise Gamgee
        required_locations:
          - The King's Pavilion
        required_fact_keywords:
          - cormallen
      - anchor_id: frodo_in_scouring
        title: Home, Yet Not Untouched
        objective: Return to the Shire, measure the wound done to home, and resist bitterness while helping put things back into right order.
        guidance: Frodo should feel sorrow, restraint, and protective love for the Shire without any taste for petty triumph.
        suggested_actions:
          - talk Sam
          - talk Farmer Cotton
          - go The Party Field
        required_npcs:
          - Samwise Gamgee
          - Farmer Cotton
        required_locations:
          - The Party Field
        required_fact_keywords:
          - shire
      - anchor_id: frodo_at_grey_havens
        title: The Long Farewell
        objective: Speak your farewells, look westward with full knowledge of what must be left, and let the road end where the Sea begins.
        guidance: Frodo should feel sorrow, release, and the ache of parting from all he loves without bitterness.
        suggested_actions:
          - talk Gandalf
          - talk Sam
          - go The White Ship
        required_npcs:
          - Gandalf
          - Samwise Gamgee
        required_locations:
          - The White Ship
        required_fact_keywords:
          - sea
  - id: sam_faithful_heart
    label: "Sam: Faithful Heart in the Dark"
    character_id: sam
    summary: Sam's path runs from the Shire's homely loyalties through Bombadil's strange peace and Lórien's fair sorrow into the long dark service that carries Frodo toward the Fire and back home again.
    steps:
      - anchor_id: sam_in_shire
        title: The Gardener on the Road
        objective: Leave the Shire in service to Frodo, carry love of home into the first miles of danger, and let plain loyalty prove steadier than any grand understanding.
        guidance: Sam should feel devoted, homesick, and stubbornly practical, with courage growing out of affection rather than adventure.
        suggested_actions:
          - talk Frodo
          - talk Pippin
          - go Hobbiton Road
        required_npcs:
          - Frodo Baggins
          - Pippin Took
        required_locations:
          - Hobbiton Road
        required_fact_keywords:
          - shire
      - anchor_id: sam_at_bombadils_house
        title: Rest Under a Strange Roof
        objective: Rest in Bombadil's house without surrendering your plain caution, feel wonder without ceasing to think of meals and shelter, and glimpse that the world holds safeties beyond ordinary planning.
        guidance: Sam should feel respectful, comforted, and slightly suspicious of strangeness even while he is grateful for it.
        suggested_actions:
          - talk Frodo
          - talk Tom Bombadil
          - go The Rain-washed Room
        required_npcs:
          - Frodo Baggins
          - Tom Bombadil
        required_locations:
          - The Rain-washed Room
        required_fact_keywords:
          - bombadil
      - anchor_id: sam_in_lorien
        title: Golden Light and Deep Gifts
        objective: Walk in Lórien with wonder, remember the feel of gardens and growing things, and receive beauty and grace without ever ceasing to think of Frodo's burden.
        guidance: Sam should feel humbled, moved, and still very much himself, noticing beauty through growing things, kindness, and the needs of Frodo.
        suggested_actions:
          - talk Frodo
          - talk Galadriel
          - go The Mallorn Path
        required_npcs:
          - Frodo Baggins
          - Galadriel
        required_locations:
          - The Mallorn Path
        required_fact_keywords:
          - lorien
      - anchor_id: sam_in_emyn_muil
        title: Hard Stones and Harder Mercy
        objective: Endure the bitter maze of Emyn Muil, watch Gollum with all your suspicion awake, and keep serving Frodo even when pity demands more patience than you think wise.
        guidance: Sam should feel tired, protective, and unconvinced by Gollum, with love for Frodo sharpening both suspicion and endurance.
        suggested_actions:
          - talk Frodo
          - talk Gollum
          - go The Stony Shelf
        required_npcs:
          - Frodo Baggins
          - Gollum
        required_locations:
          - The Stony Shelf
        required_fact_keywords:
          - emyn
      - anchor_id: sam_in_ithilien
        title: Herbs and Hunger
        objective: Tend to Frodo, watch Gollum, and read the signs of fair land under shadow.
        guidance: Sam's affection, plain sense, and suspicion should all matter at once.
        suggested_actions:
          - talk Frodo
          - talk Gollum
          - inspect herbs
        required_npcs:
          - Frodo Baggins
          - Gollum
        required_inspections:
          - herbs
      - anchor_id: sam_at_henneth_annun
        title: The Rabbit, the Men, and the Hidden Water
        objective: Guard Frodo under Faramir's questioning, read the quality of these men of Gondor, and hold fast to plain speech without betraying more than need requires.
        guidance: Sam should feel protective, suspicious, homesick, and unexpectedly moved by real courtesy amid danger.
        suggested_actions:
          - talk Faramir
          - talk Frodo
          - go The Forbidden Pool
        required_npcs:
          - Faramir
          - Frodo Baggins
        required_locations:
          - The Forbidden Pool
        required_fact_keywords:
          - faramir
      - anchor_id: sam_at_crossroads
        title: The Fallen King's Head
        objective: Read the meaning of the fallen statue and choose the darker road with full knowledge of what is being abandoned.
        guidance: Sam's pity, memory, and stubborn endurance should deepen here.
        suggested_actions:
          - talk Frodo
          - inspect fallen head
          - go The Morgul Road
        required_npcs:
          - Frodo Baggins
        required_inspections:
          - fallen head
        required_fact_keywords:
          - gondor
      - anchor_id: sam_at_cirith_ungol
        title: Into the Orc Tower
        objective: Hold fast to courage, gather what you can, and seek Frodo within dread and ruin.
        guidance: Fear is present, but Sam's love and resolve must outweigh it.
        suggested_actions:
          - inspect tower
          - talk Frodo
          - go The Inner Stair
        required_npcs:
          - Frodo Baggins
        required_locations:
          - The Inner Stair
        required_inspections:
          - tower
      - anchor_id: sam_on_gorgoroth
        title: The Last Road
        objective: Help Frodo onward across the ash plain, attend to his failing strength, and keep the end in view when all strength seems spent.
        guidance: Sam should feel physically emptied yet morally unshaken, remembering green things even here.
        suggested_actions:
          - talk Frodo
          - inspect ash road
          - go The Cracked Plain
        required_npcs:
          - Frodo Baggins
        required_inspections:
          - ash road
        required_fact_keywords:
          - mordor
      - anchor_id: sam_at_cormallen
        title: Honor After Sorrow
        objective: Tend to Frodo in the days after the quest, receive joy without forgetting pity, and feel ordinary love returning to the world.
        guidance: Sam should be grateful, overwhelmed, and still primarily concerned for Frodo rather than for praise.
        suggested_actions:
          - talk Frodo
          - talk Gandalf
          - go The King's Pavilion
        required_npcs:
          - Frodo Baggins
          - Gandalf
        required_locations:
          - The King's Pavilion
        required_fact_keywords:
          - cormallen
      - anchor_id: sam_in_scouring
        title: The Shire Stands Up
        objective: Help drive out the ruffians, stand with your neighbors, and feel how the long road has taught you to defend home rather than merely miss it.
        guidance: Sam should be angry, practical, and loyal, with courage aimed at restoring ordinary life rather than enlarging himself.
        suggested_actions:
          - talk Frodo
          - talk Farmer Cotton
          - inspect bywater road
        required_npcs:
          - Frodo Baggins
          - Farmer Cotton
        required_inspections:
          - bywater road
        required_fact_keywords:
          - bywater
      - anchor_id: sam_back_in_the_shire
        title: Well, I'm Back
        objective: Come home to the Shire, speak with Rosie, and feel how the journey has made home dearer without making the road unreal.
