anchors:
  - id: unexpected_party
    label: An Unexpected Party
    book: The Hobbit
    chapter: Chapter 1
    location: Bag End
    time_marker: Late afternoon in the Shire
    viewpoint_character_id: bilbo
    summary: Dwarves gather beneath Bilbo's roof, and comfort gives way to a strange, dangerous invitation.
    canon_guidance: Bilbo is reluctant, curious, and still untried; the tone should begin homely and tip toward adventure.
    scene_beats:
      - fresh cakes, seed-cakes, and teacups disturbed by impossible company
      - Gandalf's amused pressure against Bilbo's shrinking comfort
      - Thorin's grave dignity slowly turning the evening toward peril
    starting_npcs:
      - Gandalf
      - Thorin Oakenshield
    starting_companions: []
    available_exits:
      - The Green Dragon
      - The East Road
  - id: bilbo_with_trolls
    label: Bilbo Among the Trolls
    book: The Hobbit
    chapter: Roast Mutton
    location: Trollshaws
    time_marker: A wet uneasy night under trees
    viewpoint_character_id: bilbo
    summary: Bilbo comes with the dwarves into the trolls' dark camp, where hunger, fear, and foolish courage leave him badly outmatched until daylight and Gandalf's wit intervene.
    canon_guidance: The scene should feel comic only at the edge of real danger; Bilbo is out of his depth and knows it.
    scene_beats:
      - firelight, sacks, and huge coarse voices in the wet dark
      - Bilbo's first burglary turning quickly toward panic and humiliation
      - Gandalf's unseen interference buying time until dawn can finish what wit began
    starting_npcs:
      - Gandalf
      - William Huggins
    starting_companions:
      - Gandalf
    available_exits:
      - The Trolls' Clearing
      - The Stone Trolls
  - id: bilbo_in_rivendell
    label: Bilbo in Rivendell
    book: The Hobbit
    chapter: A Short Rest
    location: Rivendell
    time_marker: A cool evening in the hidden valley
    viewpoint_character_id: bilbo
    summary: Bilbo rests in Rivendell among song, food, and old wisdom, where danger seems gentler without being forgotten.
    canon_guidance: The scene should feel restorative, learned, and quietly beautiful, with Bilbo's relief softened by the sense of standing among deeper histories than his own.
    scene_beats:
      - song and bright water undoing the strain of rough travel
      - Elrond's lore making the quest feel older and weightier
      - comfort that refreshes courage rather than replacing it
    starting_npcs:
      - Elrond
      - Gandalf
    starting_companions:
      - Gandalf
    available_exits:
      - Elrond's House
      - The Council Porch
  - id: bilbo_in_goblin_town
    label: Bilbo in Goblin-town
    book: The Hobbit
    chapter: Over Hill and Under Hill
    location: Goblin Town
    time_marker: A black clamorous hour under the mountain
    viewpoint_character_id: bilbo
    summary: Bilbo is swept with the dwarves into Goblin-town, where noise, malice, and the Great Goblin's hall turn capture into a frantic escape that ends in separation.
    canon_guidance: The scene should feel swift, uproarious, and dangerous, with Bilbo more carried by events than mastering them.
    scene_beats:
      - sudden capture and torchlit uproar in the goblin halls
      - Gandalf's intervention turning humiliation into violent escape
      - Bilbo's separation in darkness making the next stage frighteningly solitary
    starting_npcs:
      - Gandalf
      - The Great Goblin
      - Thorin Oakenshield
    starting_companions:
      - Gandalf
      - Thorin Oakenshield
    available_exits:
      - The Great Goblin's Hall
      - Goblin tunnels beneath the Misty Mountains
  - id: riddles_in_the_dark
    label: Riddles in the Dark
    book: The Hobbit
    chapter: Chapter 5
    location: Goblin tunnels beneath the Misty Mountains
    time_marker: A dark hour under the mountains
    viewpoint_character_id: bilbo
    summary: Lost in the dark, Bilbo comes upon a lonely lake, a ring, and a creature older in misery than he can guess.
    canon_guidance: Bilbo is alone and afraid but beginning to discover resourcefulness.
    scene_beats:
      - the cold ring in Bilbo's hand before he understands its worth
      - black water and unseen movement under rock
      - pity and revulsion mingled in the riddle-game
    starting_npcs:
      - Gollum
    starting_companions: []
    available_exits:
      - The Black Tunnel
      - The Underground Lake
  - id: bilbo_with_eagles
    label: Bilbo with the Eagles
    book: The Hobbit
    chapter: Out of the Frying-Pan into the Fire
    location: The Eagles' Eyrie
    time_marker: A cold bright dawn above the forest
    viewpoint_character_id: bilbo
    summary: Bilbo wakes above the pines in the eagles' high refuge, shaken out of terror and set suddenly beneath a sky so wide it scarcely feels safe yet.
    canon_guidance: Relief should be real, but still fragile; Bilbo is exhausted, grateful, and only beginning to understand how narrow his escape was.
    scene_beats:
      - dawn wind and empty height after the suffocating dark below
      - the eagles' unsentimental rescue as a mercy, not a domestic comfort
      - Gandalf turning survival into the next necessary stage of the journey
    starting_npcs:
      - Great Eagle
      - Gandalf
    starting_companions:
      - Gandalf
    available_exits:
      - The Eagle Ledge
      - The Carrock
  - id: bilbo_at_beorns_house
    label: Bilbo at Beorn's House
    book: The Hobbit
    chapter: Queer Lodgings
    location: Beorn's House
    time_marker: A bright but wary morning east of the mountains
    viewpoint_character_id: bilbo
    summary: Bilbo comes to Beorn's hall in relief and uncertainty, where food, shelter, and stern judgment meet under one roof.
    canon_guidance: Bilbo should feel small, grateful, and highly conscious that hospitality here is a gift to be earned rather than assumed.
    scene_beats:
      - immense halls and good bread set beside the danger of being unwelcome
      - Gandalf's careful management of introductions
      - Beorn's hard practicality making safety feel real rather than cozy
    starting_npcs:
      - Beorn
      - Gandalf
    starting_companions:
      - Gandalf
    available_exits:
      - The Bee Pastures
      - The Great Hall
  - id: bilbo_at_hidden_door
    label: The Hidden Door
    book: The Hobbit
    chapter: Chapter 11
    location: The Hidden Door
    time_marker: A pale autumn evening on the Lonely Mountain
    viewpoint_character_id: bilbo
    summary: Bilbo stands with the dwarves upon the Lonely Mountain's flank, seeking the secret door while silence and dragon-fear lie heavy over the stone.
    canon_guidance: Wonder, weariness, and the pressure of Thorin's hopes should all rest upon Bilbo here.
    scene_beats:
      - the westering light touching grey stone without yielding the secret
      - Balin's steady companionship amid mounting doubt
      - the mountain's hush disturbed only by wind and distant memory of Smaug
    starting_npcs:
      - Balin
      - Dwalin
    starting_companions: []
    available_exits:
      - Ravenhill Path
      - Lonely Mountain Slopes
  - id: bilbo_in_mirkwood
    label: Bilbo in Mirkwood
    book: The Hobbit
    chapter: Flies and Spiders
    location: Mirkwood
    time_marker: A dim and airless noon under the forest roof
    viewpoint_character_id: bilbo
    summary: Bilbo moves through the dark of Mirkwood where hunger, weariness, and a lurking malice press the dwarves toward fear and confusion.
    canon_guidance: The forest should feel oppressive and enchanted in the worst sense, while Bilbo's courage comes reluctantly but decisively.
    scene_beats:
      - black boughs and dim paths that seem to close behind the company
      - Bilbo's growing readiness to act alone for others' sake
      - the sudden horror of spiders in a place already thick with dread
    starting_npcs:
      - Balin
    starting_companions:
      - Balin
    available_exits:
      - The Dark Track
      - The Spider Glade
  - id: bilbo_in_woodland_realm
    label: Bilbo in the Woodland Realm
    book: The Hobbit
    chapter: Barrels Out of Bond
    location: The Woodland Realm
    time_marker: A guarded underground night beneath the forest
    viewpoint_character_id: bilbo
    summary: Bilbo moves unseen through the Elvenking's underground halls, balancing stealth, pity, and the practical burden of rescuing the dwarves.
    canon_guidance: Bilbo should feel lonely, clever, and more responsible than ever before, with no room for comfort in his freedom.
    scene_beats:
      - torchlit stone, flowing water, and Elvish order beneath the dark wood
      - Bilbo's invisibility becoming a tool of rescue rather than mere escape
      - the pressure of planning for many lives with no strength but his own wit
    starting_npcs:
      - Thranduil
    starting_companions: []
    available_exits:
      - The Elven Gate
      - The Wine Cellars
  - id: bilbo_in_lake_town
    label: Bilbo in Lake-town
    book: The Hobbit
    chapter: A Warm Welcome
    location: Lake-town
    time_marker: A bright cold morning over the Long Lake
    viewpoint_character_id: bilbo
    summary: Bilbo comes with the dwarves into Lake-town, where wonder, rumor, and the memory of old songs place new weight upon their errand.
    canon_guidance: The mood should be bright and hopeful, but with enough undercurrent of expectation to remind Bilbo how large the tale has become.
    scene_beats:
      - the sudden comfort of food, warmth, and human welcome after hardship
      - songs of old kingship setting a burden on Thorin and the company alike
      - Bilbo's quiet embarrassment at being made part of a larger legend
    starting_npcs:
      - Bard
      - Thorin Oakenshield
      - The Master of Lake-town
      - Bofur
    starting_companions:
      - Thorin Oakenshield
    available_exits:
      - The Master's Hall
      - The Quays
  - id: frodo_departs_shire
    label: The Road Leaves the Shire
    book: The Fellowship of the Ring
    chapter: Three Is Company
    location: The Shire
    time_marker: Early autumn evening
    viewpoint_character_id: frodo
    summary: Frodo sets out from home under a quiet sky, carrying more than most eyes can see.
    canon_guidance: The world still feels green and familiar, but dread has already entered the margins.
    scene_beats:
      - the ordinary beauty of hedges, lane, and fading day
      - the companionship of Sam and Pippin under unspoken worry
      - the first felt division between home and road
    starting_npcs:
      - Samwise Gamgee
      - Pippin Took
    starting_companions:
      - Samwise Gamgee
      - Pippin Took
    available_exits:
      - Hobbiton Road
      - Woody End
      - Farmer Maggot's Lands
  - id: frodo_in_old_forest
    label: Frodo in the Old Forest
    book: The Fellowship of the Ring
    chapter: The Old Forest
    location: The Old Forest
    time_marker: A dim afternoon under leaning boughs
    viewpoint_character_id: frodo
    summary: Frodo leaves ordinary roads behind and feels the Old Forest's ill will close around the Company in a way pursuit on the highway never did.
    canon_guidance: The scene should feel oppressive, strange, and more ancient than the hobbits are prepared for.
    scene_beats:
      - paths shifting beneath a pressure that feels almost intentional
      - the hobbits' courage reduced to persistence and mutual trust
      - the alarming realization that some dangers do not think like riders or men
    starting_npcs:
      - Merry Brandybuck
      - Samwise Gamgee
      - Pippin Took
    starting_companions:
      - Merry Brandybuck
      - Samwise Gamgee
      - Pippin Took
    available_exits:
      - The Old Willow
      - The Withywindle Bank
  - id: frodo_at_bombadils_house
    label: Frodo at Bombadil's House
    book: The Fellowship of the Ring
    chapter: In the House of Tom Bombadil
    location: Tom Bombadil's House
    time_marker: A rain-washed evening under a thatched roof
    viewpoint_character_id: frodo
    summary: Frodo rests in a house of song and inexplicable peace where fear is checked by wonder rather than argument.
    canon_guidance: The mood should feel sheltered and bright, but in a manner strange enough to remain slightly unsettling.
    scene_beats:
      - Tom's singing hospitality overturning ordinary expectations of safety
      - Goldberry's stillness making the house feel part of rain, river, and season
      - Frodo's burden briefly held at a distance without being denied
    starting_npcs:
      - Tom Bombadil
      - Goldberry
    starting_companions:
      - Merry Brandybuck
      - Samwise Gamgee
      - Pippin Took
    available_exits:
      - The Rain-washed Room
      - The Withywindle Bank
  - id: frodo_on_barrow_downs
    label: Frodo on the Barrow-downs
    book: The Fellowship of the Ring
    chapter: Fog on the Barrow-downs
    location: The Barrow-downs
    time_marker: A white cold morning under drifting mist
    viewpoint_character_id: frodo
    summary: Frodo comes among the barrows where ancient death and cold enchantment lie close to the surface of the Downs.
    canon_guidance: Fear here should be colder, older, and more sepulchral than the living malice of the Forest.
    scene_beats:
      - mist and standing stones making the land itself uncertain
      - Frodo's love for his companions sharpening into action under dread
      - Tom's rescue revealing the nearness of forgotten ages to the Shire
    starting_npcs:
      - Tom Bombadil
      - Merry Brandybuck
      - Samwise Gamgee
      - Pippin Took
    starting_companions:
      - Merry Brandybuck
      - Samwise Gamgee
      - Pippin Took
    available_exits:
      - The Standing Stones
      - The Barrow Chamber
  - id: frodo_at_bree
    label: Shadows at The Prancing Pony
    book: The Fellowship of the Ring
    chapter: At the Sign of The Prancing Pony
    location: The Prancing Pony
    time_marker: A late rainy evening
    viewpoint_character_id: frodo
    summary: Frodo sits amid the inn's uneasy company while rumor, clumsiness, and hidden pursuit tighten the night.
    canon_guidance: Frodo is uneasy, polite, and increasingly aware that danger answers even small mistakes.
    scene_beats:
      - firelight, pipesmoke, and suspicious eyes in the common room
      - Butterbur's bustling welcome frayed by forgetfulness
      - Aragorn's guarded intervention after Frodo draws notice
    starting_npcs:
      - Aragorn
      - Barliman Butterbur
    starting_companions:
      - Samwise Gamgee
      - Pippin Took
    available_exits:
      - Bree
      - The North Road
  - id: frodo_at_weathertop
    label: Weathertop at Night
    book: The Fellowship of the Ring
    chapter: A Knife in the Dark
    location: Weathertop
    time_marker: A cold night under hunted stars
    viewpoint_character_id: frodo
    summary: On the bare hill the sense of pursuit sharpens into terror, and Frodo feels both loneliness and deadly nearness.
    canon_guidance: The atmosphere should be exposed, fearful, and almost unbearably watchful.
    scene_beats:
      - the hill-top ruin offering little shelter against night and fear
      - Aragorn's care set against the growing dread of pursuit
      - Frodo's inward strain sharpening beneath the Ring's pull
    starting_npcs:
      - Aragorn
      - Samwise Gamgee
    starting_companions:
      - Samwise Gamgee
      - Pippin Took
    available_exits:
      - The Ruined Ring
      - The Eastward Path
  - id: frodo_ford_bruinen
    label: The Ford of Bruinen
    book: The Fellowship of the Ring
    chapter: Flight to the Ford
    location: The Ford of Bruinen
    time_marker: A hard bright day at the edge of flight
    viewpoint_character_id: frodo
    summary: Wearied almost beyond thought, Frodo reaches the Ford with hope and dread bound tightly together.
    canon_guidance: Weakness, urgency, and the nearness of refuge should all be present at once.
    scene_beats:
      - the last hard miles ridden under pain and failing strength
      - Glorfindel's brightness as a thin shield against terror
      - the river standing between hunted exhaustion and fleeting safety
    starting_npcs:
      - Glorfindel
      - Aragorn
    starting_companions:
      - Samwise Gamgee
    available_exits:
      - The Ford Bank
      - The Rivendell Road
  - id: frodo_in_rivendell
    label: Healing in Rivendell
    book: The Fellowship of the Ring
    chapter: Many Meetings
    location: Rivendell
    time_marker: A quiet morning after healing
    viewpoint_character_id: frodo
    summary: Rest, memory, and the beauty of Rivendell give Frodo a little peace before the weight of counsel returns.
    canon_guidance: Frodo should feel relieved but not unburdened; beauty and sorrow should mingle.
    scene_beats:
      - clear water, song, and healing that does not erase danger
      - Gandalf's return to speech after fear and waiting
      - the approach of counsels too great to avoid
    starting_npcs:
      - Gandalf
      - Elrond
      - Aragorn
    starting_companions: []
    available_exits:
      - Elrond's House
      - The Council Porch
      - The Pine-clad Paths
  - id: frodo_at_west_gate
    label: Before the Doors of Moria
    book: The Fellowship of the Ring
    chapter: A Journey in the Dark
    location: Hollin
    time_marker: A grey evening beside the dark water
    viewpoint_character_id: frodo
    summary: The Company halts before the hidden doors of Moria, with weariness, unease, and necessity pressing them toward a road none of them desire.
    canon_guidance: The mood should be wary, tired, and reluctant, with Gandalf's knowledge and Frodo's foreboding both carrying weight.
    scene_beats:
      - the still black water before the West-gate and the memory of moon-letters
      - the Fellowship balanced between open peril and enclosed terror
      - Frodo's sense that the road ahead is chosen more by need than by will
    starting_npcs:
      - Gandalf
      - Aragorn
      - Boromir
    starting_companions:
      - Samwise Gamgee
    available_exits:
      - The West-gate
      - The Water's Edge
  - id: frodo_in_lorien
    label: Rest in Lothlórien
    book: The Fellowship of the Ring
    chapter: Lothlórien
    location: Lothlórien
    time_marker: A clear golden morning among the mallorn trees
    viewpoint_character_id: frodo
    summary: After grief and darkness, Frodo comes into the Golden Wood where beauty, sorrow, and a strange peace lie closely together.
    canon_guidance: Lórien should feel consoling yet remote, lovely yet touched by fading, and Frodo should never feel wholly unburdened.
    scene_beats:
      - golden light and high branches unlike any mortal woodland
      - grief for Gandalf mingled with the beginning of healing
      - Galadriel's presence deepening both comfort and unease
    starting_npcs:
      - Galadriel
      - Haldir
    starting_companions:
      - Samwise Gamgee
    available_exits:
      - Caras Galadhon
      - The Mallorn Path
  - id: frodo_at_amon_hen
    label: The Breaking at Amon Hen
    book: The Fellowship of the Ring
    chapter: The Breaking of the Fellowship
    location: Amon Hen
    time_marker: A troubled noon beside the Great River
    viewpoint_character_id: frodo
    summary: The Company comes at last to Amon Hen, where weariness, temptation, and the pressure of choice break the fellowship apart.
    canon_guidance: This scene should feel urgent, inward, and sorrowful, with Frodo's isolation deepening even among companions.
    scene_beats:
      - the Seat of Seeing and the oppressive nearness of decision
      - Boromir's troubled desire forcing Frodo further inward
      - Sam's loyalty standing against the sundering of the company
    starting_npcs:
      - Boromir
      - Samwise Gamgee
    starting_companions:
      - Samwise Gamgee
    available_exits:
      - The Seat of Seeing
      - The Eastern Shore
  - id: frodo_in_emyn_muil
    label: Among the Stones of Emyn Muil
    book: The Two Towers
    chapter: The Taming of Sméagol
    location: Emyn Muil
    time_marker: A grey hungry day among broken ridges
    viewpoint_character_id: frodo
    summary: Frodo and Sam labor through the cruel stones of Emyn Muil, where the land itself opposes them until Gollum's capture turns pity into their next uncertain road.
    canon_guidance: The scene should feel stony, weary, and morally exacting; Frodo's mercy matters because everything else here is hard.
    scene_beats:
      - endless rock and descent without any kindly road
      - Gollum caught between fear, pleading, and old malice
      - Frodo binding the creature by pity and necessity rather than trust
    starting_npcs:
      - Gollum
      - Samwise Gamgee
    starting_companions:
      - Samwise Gamgee
    available_exits:
      - The Slinker Stair
      - The Stony Shelf
  - id: frodo_in_dead_marshes
    label: Through the Dead Marshes
    book: The Two Towers
    chapter: The Passage of the Marshes
    location: The Dead Marshes
    time_marker: A dim and weary day under reeking vapors
    viewpoint_character_id: frodo
    summary: Frodo follows Gollum through the Dead Marshes where exhaustion, pity, and horror move together over drowned memory and treacherous lights.
    canon_guidance: The scene should feel haunted, wasted, and dreamlike, yet morally intimate because Frodo still pities what is degraded.
    scene_beats:
      - pale lights over water and faces beneath the marsh
      - Gollum's guidance accepted without trust
      - Frodo's pity persisting where hope and beauty are nearly gone
    starting_npcs:
      - Gollum
      - Samwise Gamgee
    starting_companions:
      - Samwise Gamgee
    available_exits:
      - The Marsh Path
      - The Dead Faces Mere
  - id: frodo_at_henneth_annun
    label: Frodo at Henneth Annûn
    book: The Two Towers
    chapter: The Forbidden Pool
    location: Henneth Annûn
    time_marker: A hidden evening under falling water
    viewpoint_character_id: frodo
    summary: Frodo comes into Faramir's hidden refuge in Ithilien, where courtesy, peril, and discernment meet under stone, water, and the burden of secrecy.
    canon_guidance: The mood should be fair, guarded, and morally searching, with relief never fully released from danger.
    scene_beats:
      - hidden refuge behind falling water and the strange comfort of ordered men in war
      - Faramir's grave courtesy testing Frodo more keenly than open suspicion would
      - Gollum's hunted misery sharpening the pity and risk of the moment
    starting_npcs:
      - Faramir
      - Samwise Gamgee
      - Gollum
    starting_companions:
      - Samwise Gamgee
    available_exits:
      - The Forbidden Pool
      - The Window on the West
  - id: frodo_on_morgul_stairs
    label: The Stairs Above Minas Morgul
    book: The Two Towers
    chapter: The Stairs of Cirith Ungol
    location: The Morgul Stairs
    time_marker: A dim crawling day above the valley of dread
    viewpoint_character_id: frodo
    summary: Frodo climbs the dreadful stairs above Minas Morgul, worn thin by the Ring and by the long road, yet still moved by pity and the memory of gentler lands.
    canon_guidance: Weariness, temptation, and pity should all be present, with the sense that the road is becoming spiritually thinner as well as physically harder.
    scene_beats:
      - the labour of the endless stair under a poisoned sky
      - Gollum's divided service and wounded malice
      - Frodo's inward weakening set against flashes of tenderness and resolve
    starting_npcs:
      - Gollum
      - Samwise Gamgee
    starting_companions:
      - Samwise Gamgee
    available_exits:
      - The High Stair
      - The Tunnel Mouth
  - id: aragorn_in_fangorn
    label: Aragorn in Fangorn
    book: The Two Towers
    chapter: The White Rider
    location: Fangorn Forest
    time_marker: A pale morning under ancient boughs
    viewpoint_character_id: aragorn
    summary: Aragorn searches Fangorn with Legolas and Gimli, where grief, urgency, and the uncanny life of the forest sharpen into astonishment at a white-clad figure among the trees.
    canon_guidance: The scene should feel weary, alert, and uncanny, with Aragorn's leadership steadying fear without reducing the mystery.
    scene_beats:
      - old trees and baffling tracks making pursuit feel more like reading a living mind than a road
      - the Three Hunters held between hope for Merry and Pippin and doubt about every sign
      - the white figure's appearance turning danger into wonder without easing tension at once
    starting_npcs:
      - Gimli
      - Legolas
      - Gandalf
    starting_companions:
      - Gimli
      - Legolas
    available_exits:
      - The Tree-shadowed Path
      - The Green Hollow
  - id: gandalf_in_moria
    label: Gandalf at the Bridge of Khazad-dum
    book: The Fellowship of the Ring
    chapter: The Bridge of Khazad-dum
    location: The Bridge of Khazad-dum
    time_marker: A black hour in the deeps below the mountain
    viewpoint_character_id: gandalf
    summary: Gandalf holds the Company's retreat in Moria, where ancient darkness pursues them through fire, drumbeat, and the last narrow bridge.
    canon_guidance: The scene should be urgent, terrible, and sacrificial, with Gandalf's authority rising against terror rather than diminishing it.
    scene_beats:
      - drums and flame in the deeps turning fear into unavoidable conflict
      - Gandalf choosing to spend himself so the others may escape
      - the old greatness and old ruin of Khazad-dum closing around a final stand
    starting_npcs:
      - Aragorn
      - Legolas
      - Gimli
      - Frodo Baggins
      - Durin's Bane
    starting_companions:
      - Aragorn
      - Legolas
      - Gimli
      - Frodo Baggins
    available_exits:
      - The Chamber of Mazarbul
      - The Dimrill Stair
  - id: ranger_at_bree
    label: A Watcher in Bree
    book: The Fellowship of the Ring
    chapter: At the Sign of The Prancing Pony
    location: Bree
    time_marker: Rainy night in Bree
    viewpoint_character_id: aragorn
    summary: Aragorn keeps wary watch in the common room while news, fear, and the scent of pursuit gather about the hobbits.
    canon_guidance: Aragorn is cautious, observant, and not yet openly kingly.
    scene_beats:
      - a Ranger reading faces and doors in a room full of loose tongues
      - the hobbits' peril plain to Aragorn before it is plain to themselves
      - trust offered in measured fashion, never cheaply
    starting_npcs:
      - Frodo Baggins
      - Barliman Butterbur
    starting_companions: []
    available_exits:
      - The Prancing Pony
      - The North Road
  - id: gandalf_at_bag_end
    label: Gandalf at Bag End
    book: The Fellowship of the Ring
    chapter: The Shadow of the Past
    location: Bag End
    time_marker: A lamplit evening with rain in the garden and dread in the room
    viewpoint_character_id: gandalf
    summary: Gandalf comes to Bag End where friendship and warning must be joined, and the quiet of the Shire is asked to bear a truth far darker than it was made for.
    canon_guidance: Gandalf should be grave, affectionate, and unsparing, with pity made practical through clarity rather than comfort.
    scene_beats:
      - the round room's ordinary warmth standing against the scale of the danger being named
      - Frodo's inheritance turning from family mystery into the burden of the age
